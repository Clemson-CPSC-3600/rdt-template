name: GitHub Classroom Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Create venv at <repo>/venv/ so run_tests.py's strict
      # in-project-venv check (tests/_capture/runtime_triggers.is_local_venv)
      # is satisfied -- matching how students run locally.
      - name: Create project venv and install dependencies
        run: |
          python -m venv venv
          venv/bin/python -m pip install --upgrade pip
          venv/bin/python -m pip install -r requirements.txt
          echo "$PWD/venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/venv" >> "$GITHUB_ENV"

      - name: Check if students copied files to src
        run: |
          echo "Checking src directory contents..."
          if [ -z "$(ls -A src/*.py 2>/dev/null)" ]; then
            echo "ERROR: No Python files found in src/ directory!"
            echo "Did you forget to copy the template files?"
            echo "Run: cp template/*.py src/"
            exit 1
          fi
          echo "Found Python files in src/:"
          ls -la src/*.py

      # Canonical scoring run. Writes .test-run-state/last_bundle_status.json
      # which the autograding step's github_grader.py invocations read so
      # Classroom's score is computed from the same data students saw here.
      - name: Run tests (writes bundle status for autograder)
        run: python run_tests.py
        continue-on-error: true

      - name: Autograding Reporter
        uses: education/autograding@v1
        if: always()
